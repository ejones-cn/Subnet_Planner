name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: [3.8, 3.9, 3.10, 3.11]
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
        cache-dependency-path: '**/requirements.txt'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --no-cache-dir -i https://mirrors.aliyun.com/pypi/simple/ pytest reportlab
    
    - name: Run tests
      run: |
        for %%f in (test_*.py) do (
          echo Running %%f
          python %%f
          if errorlevel 1 exit /b 1
        )
    
    - name: Run linting
      run: |
        pip install --no-cache-dir -i https://mirrors.aliyun.com/pypi/simple/ flake8 black isort
        flake8 .
        black --check .
        isort --check .
  
  build:
    needs: test
    runs-on: windows-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        cache: 'pip'
        cache-dependency-path: '**/requirements.txt'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --no-cache-dir -i https://mirrors.aliyun.com/pypi/simple/ pyinstaller reportlab
    
    - name: Build executable
      run: |
        python build_compile.py
    
    - name: Upload artifact
      uses: actions/upload-artifact@v3
      with:
        name: SubnetPlanner
        path: SubnetPlannerV*.exe
        retention-days: 7