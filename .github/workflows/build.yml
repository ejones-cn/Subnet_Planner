name: Build SubnetPlanner

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.10'
  NUITKA_VERSION: '2.1.1'

jobs:
  build-standalone:
    name: Build Standalone (Directory)
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Nuitka and dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install nuitka==${{ env.NUITKA_VERSION }} pillow ip_subnet_calculator tkcalendar --index-url https://pypi.tuna.tsinghua.edu.cn/simple

      - name: Build with Nuitka (Standalone)
        shell: bash
        run: |
          python -m nuitka --mode=standalone \
            --follow-imports \
            --include-module=splash_screen \
            --include-module=font_config \
            --include-module=style_manager \
            --include-module=chart_utils \
            --include-module=visualization \
            --include-package=tkcalendar \
            --windows-icon-from-ico=icon.ico \
            --include-data-file=translations.json=translations.json \
            --include-data-file=SubnetPlanner_config.json=SubnetPlanner_config.json \
            --include-data-dir=Picture=Picture \
            --enable-plugin=tk-inter \
            --windows-console-mode=attach \
            --assume-yes-for-downloads \
            --nofollow-import-to=babel \
            --nofollow-import-to=tzdata \
            --nofollow-import-to=setuptools \
            --nofollow-import-to=pip \
            --nofollow-import-to=charset_normalizer \
            --nofollow-import-to=urllib3 \
            --nofollow-import-to=certifi \
            --nofollow-import-to=requests \
            --nofollow-import-to=numpy \
            --nofollow-import-to=scipy \
            --nofollow-import-to=matplotlib \
            --nofollow-import-to=pandas \
            --nofollow-import-to=sklearn \
            --output-filename=SubnetPlanner.exe \
            windows_app.py

      - name: Prepare and rename output
        shell: bash
        run: |
          if [ -d "windows_app.dist" ]; then
            mv windows_app.dist SubnetPlanner_Nuitka.dist
            cd SubnetPlanner_Nuitka.dist
            if [ -f "windows_app.exe" ]; then
              mv windows_app.exe SubnetPlanner.exe
            fi
            cd ..
          fi

      - name: Upload Standalone build
        uses: actions/upload-artifact@v4
        with:
          name: SubnetPlanner_Standalone
          path: SubnetPlanner_Nuitka.dist/
          retention-days: 30

  build-onefile:
    name: Build OneFile (Single EXE)
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Nuitka and dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install nuitka==${{ env.NUITKA_VERSION }} pillow ip_subnet_calculator tkcalendar --index-url https://pypi.tuna.tsinghua.edu.cn/simple

      - name: Get version from version.py
        id: get_version
        shell: bash
        run: |
          VERSION=$(grep -Po '(?<=VERSION\s*=\s*["'\''])[^"'\'']*(?=["'\''])' version.py || echo "1.0.0")
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Build with Nuitka (OneFile)
        shell: bash
        run: |
          python -m nuitka --mode=onefile \
            --follow-imports \
            --include-module=splash_screen \
            --include-module=font_config \
            --include-module=style_manager \
            --include-module=chart_utils \
            --include-module=visualization \
            --include-package=tkcalendar \
            --windows-icon-from-ico=icon.ico \
            --include-data-file=translations.json=translations.json \
            --include-data-file=SubnetPlanner_config.json=SubnetPlanner_config.json \
            --include-data-dir=Picture=Picture \
            --enable-plugin=tk-inter \
            --windows-console-mode=attach \
            --assume-yes-for-downloads \
            --nofollow-import-to=babel \
            --nofollow-import-to=tzdata \
            --nofollow-import-to=setuptools \
            --nofollow-import-to=pip \
            --nofollow-import-to=charset_normalizer \
            --nofollow-import-to=urllib3 \
            --nofollow-import-to=certifi \
            --nofollow-import-to=requests \
            --nofollow-import-to=numpy \
            --nofollow-import-to=scipy \
            --nofollow-import-to=matplotlib \
            --nofollow-import-to=pandas \
            --nofollow-import-to=sklearn \
            --output-filename=SubnetPlannerV${{ env.VERSION }}.exe \
            windows_app.py

      - name: Find and prepare OneFile EXE
        shell: bash
        run: |
          if [ -f "SubnetPlannerV${{ env.VERSION }}.exe" ]; then
            mkdir -p output
            mv SubnetPlannerV${{ env.VERSION }}.exe output/
          else
            echo "Looking for EXE..."
            ls -la
            for f in SubnetPlanner*.exe; do
              if [ -f "$f" ]; then
                mkdir -p output
                mv "$f" output/
                break
              fi
            done
          fi

      - name: Upload OneFile build
        uses: actions/upload-artifact@v4
        with:
          name: SubnetPlanner_OneFile
          path: output/
          retention-days: 30

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-standalone, build-onefile]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Standalone artifact
        uses: actions/download-artifact@v4
        with:
          name: SubnetPlanner_Standalone
          path: ./artifacts/standalone/

      - name: Download OneFile artifact
        uses: actions/download-artifact@v4
        with:
          name: SubnetPlanner_OneFile
          path: ./artifacts/onefile/

      - name: Zip Standalone build
        run: |
          cd ./artifacts/standalone
          zip -r ../SubnetPlanner_Standalone.zip .
          cd ../..

      - name: Get version
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./artifacts/SubnetPlanner_Standalone.zip
            ./artifacts/onefile/*.exe
          generate_release_notes: true
          fail_on_unmatched_files: true
