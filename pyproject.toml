[tool.black]
# Black formatter configuration
line-length = 120
skip-string-normalization = true
target-version = ['py38', 'py39', 'py310', 'py311']
include = '\.pyi?$'
exclude = '''
/(\.direnv|\.eggs|\.git|\.hg|\.mypy_cache|\.nox|\.tox|\.venv|__pycache__|_build|buck-out|build|dist|venv)/
'''

[tool.flake8]
# Flake8 linter configuration
max-line-length = 120
extend-ignore = ['E203', 'W503']
exclude = ['__pycache__', '.git', '.venv', 'venv', 'build', 'dist']
select = ['E', 'F', 'W', 'C901']

[tool.basedpyright]
reportAny = false
reportExplicitAny = false
reportUnknownVariableType = false
reportUnknownArgumentType = false
reportUnknownMemberType = false
reportUnknownLambdaType = false
reportUnknownParameterType = false
reportMissingParameterType = false
reportMissingTypeArgument = false
reportUnusedCallResult = false
ignore = [
    "windows_app.py",
    "export_utils.py",
    "chart_utils.py",
    "style_manager.py",
    "ip_subnet_calculator.py",
    "version_info.py",
    "test_column_width.py",
    "manage_version.py",
    "verify_versions.py",
    "remove_search_ip.py",
    "shorten_japanese_dropdown.py",
    "debug_expired.py",
    "add_translations.py",
    "debug_app_init.py",
    "fix_expiry_date.py",
    "check_expiry_date.py",
    "shorten_address_mgmt_abbr.py",
    "shorten_korean_dropdown.py",
    "test_get_expired.py",
    "test_app_flow.py",
    "check_db.py",
    "debug_get_expired.py",
    "shorten_japanese_more.py",
    "shorten_korean.py",
    "update_addr_full.py",
    "update_japanese_import_export.py",
    "shorten_address_management.py",
    "add_invalid_ip.py",
    "fix_encoding.py",
    "update_addr_networks.py",
    "check_translation.py",
